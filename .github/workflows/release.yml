name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute image tags
        id: image
        run: |
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}"
          raw_tag="${GITHUB_REF_NAME}"
          version="${raw_tag#v}"

          if [[ ! "$version" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Tag '$raw_tag' is not supported. Expected v<major>.<minor>.<patch> or <major>.<minor>.<patch>."
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"

          {
            echo "name=$image_name"
            echo "version=$version"
            echo "major=$major"
            echo "minor=$minor"
            echo "patch=$patch"
            echo "tags<<EOF"
            echo "$image_name:v$major.$minor.$patch"
            echo "$image_name:v$major.$minor"
            echo "$image_name:v$major"
            echo "$image_name:$major.$minor.$patch"
            echo "$image_name:$major.$minor"
            echo "$image_name:$major"
            echo "$image_name:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.image.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Find previous tag
        id: previous_tag
        uses: actions/github-script@v7
        with:
          script: |
            const currentTag = context.ref.replace("refs/tags/", "");
            const { owner, repo } = context.repo;
            const response = await github.rest.repos.listTags({
              owner,
              repo,
              per_page: 100,
            });

            const previousTag = response.data.find((tag) => tag.name !== currentTag);
            core.setOutput("name", previousTag?.name ?? "");

      - name: Generate release notes
        id: release_notes
        uses: actions/github-script@v7
        with:
          script: |
            const currentTag = context.ref.replace("refs/tags/", "");
            const previousTag = `${{ steps.previous_tag.outputs.name }}`.trim();
            const { owner, repo } = context.repo;

            if (!previousTag) {
              const notes = [
                `## ${currentTag}`,
                "",
                "Initial tagged release.",
                "",
                "Published container tags:",
                "",
                "- `${{ steps.image.outputs.name }}:v${{ steps.image.outputs.version }}`",
                "- `${{ steps.image.outputs.name }}:v${{ steps.image.outputs.major }}.${{ steps.image.outputs.minor }}`",
                "- `${{ steps.image.outputs.name }}:v${{ steps.image.outputs.major }}`",
                "- `${{ steps.image.outputs.name }}:${{ steps.image.outputs.version }}`",
                "- `${{ steps.image.outputs.name }}:${{ steps.image.outputs.major }}.${{ steps.image.outputs.minor }}`",
                "- `${{ steps.image.outputs.name }}:${{ steps.image.outputs.major }}`",
                "- `${{ steps.image.outputs.name }}:latest`",
              ].join("\n");
              core.setOutput("body", notes);
              return;
            }

            const response = await github.rest.repos.generateReleaseNotes({
              owner,
              repo,
              tag_name: currentTag,
              previous_tag_name: previousTag,
            });

            const notes = [
              response.data.body.trim(),
              "",
              "Published container tags:",
              "",
              "- `${{ steps.image.outputs.name }}:v${{ steps.image.outputs.version }}`",
              "- `${{ steps.image.outputs.name }}:v${{ steps.image.outputs.major }}.${{ steps.image.outputs.minor }}`",
              "- `${{ steps.image.outputs.name }}:v${{ steps.image.outputs.major }}`",
              "- `${{ steps.image.outputs.name }}:${{ steps.image.outputs.version }}`",
              "- `${{ steps.image.outputs.name }}:${{ steps.image.outputs.major }}.${{ steps.image.outputs.minor }}`",
              "- `${{ steps.image.outputs.name }}:${{ steps.image.outputs.major }}`",
              "- `${{ steps.image.outputs.name }}:latest`",
            ].join("\n");

            core.setOutput("body", notes);

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.release_notes.outputs.body }}
