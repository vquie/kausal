name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build, Release and Publish Image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Compute image metadata
        id: image
        shell: bash
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo="$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          raw_tag="${GITHUB_REF_NAME}"
          version="${raw_tag#v}"

          if [[ ! "$version" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Tag '$raw_tag' is not supported. Expected v<major>.<minor>.<patch> or <major>.<minor>.<patch>."
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"

          {
            echo "name=ghcr.io/${owner}/${repo}"
            echo "version=$version"
            echo "major=$major"
            echo "minor=$minor"
            echo "prefixed_version=v$version"
          } >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=v${{ steps.image.outputs.version }}
            type=raw,value=v${{ steps.image.outputs.major }}.${{ steps.image.outputs.minor }}
            type=raw,value=v${{ steps.image.outputs.major }}
            type=raw,value=${{ steps.image.outputs.version }}
            type=raw,value=${{ steps.image.outputs.major }}.${{ steps.image.outputs.minor }}
            type=raw,value=${{ steps.image.outputs.major }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=Kausal
            org.opencontainers.image.description=Local-first Kubernetes visualization for understanding cluster relationships
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}#readme
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.revision=${{ github.sha }}
          annotations: |
            org.opencontainers.image.title=Kausal
            org.opencontainers.image.description=Local-first Kubernetes visualization for understanding cluster relationships
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}#readme
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          generate_release_notes: true
          append_body: true
          body: |
            ## Container image tags

            - `${{ steps.image.outputs.name }}:v${{ steps.image.outputs.version }}`
            - `${{ steps.image.outputs.name }}:v${{ steps.image.outputs.major }}.${{ steps.image.outputs.minor }}`
            - `${{ steps.image.outputs.name }}:v${{ steps.image.outputs.major }}`
            - `${{ steps.image.outputs.name }}:${{ steps.image.outputs.version }}`
            - `${{ steps.image.outputs.name }}:${{ steps.image.outputs.major }}.${{ steps.image.outputs.minor }}`
            - `${{ steps.image.outputs.name }}:${{ steps.image.outputs.major }}`
            - `${{ steps.image.outputs.name }}:latest`

            ## Multi-arch

            - `linux/amd64`
            - `linux/arm64`

            ## Digest

            `${{ steps.build.outputs.digest }}`
