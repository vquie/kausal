# Development-only service manifest for the local Kausal deployment.
apiVersion: v1
kind: Service
metadata:
  name: kausal
  namespace: kausal
  labels:
    app.kubernetes.io/name: kausal
    app.kubernetes.io/part-of: kausal
    app.kubernetes.io/component: backend
    app.kubernetes.io/environment: dev
spec:
  selector:
    app: kausal
  ports:
    - name: http
      port: 8080
      targetPort: 8080
