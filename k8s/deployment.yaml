apiVersion: apps/v1
kind: Deployment
metadata:
  name: kausal
  namespace: kausal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kausal
  template:
    metadata:
      labels:
        app: kausal
    spec:
      serviceAccountName: kausal
      containers:
        - name: app
          image: kausal:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi

